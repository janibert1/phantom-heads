name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --no-transfer-progress

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            --title "PhantomHeads $TAG" \
            --notes "Compatible with Paper 1.21.11 and Paper 26.x (MC 26.1+). Drop the JAR into your plugins/ folder and restart." \
            "target/PhantomHeads-${VERSION}.jar"
